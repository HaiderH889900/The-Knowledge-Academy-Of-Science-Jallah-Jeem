<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Knowledge Academy Of Science Jallah Jeem</title>
    <style>
        :root {
            --primary: #004085;
            --accent: #007bff;
            --white: #ffffff;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #e9ecef;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            perspective: 2000px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            color: var(--primary);
            padding: 20px;
        }

        /* 3D Cube Logic */
        .scene {
            width: 700px;
            height: 600px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--white);
            border: 3px solid var(--primary);
            border-radius: 15px;
            padding: 30px;
            box-sizing: border-box;
            backface-visibility: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        /* Face Orientations */
        .login-face    { transform: rotateY(0deg) translateZ(350px); }
        .reg-face      { transform: rotateY(90deg) translateZ(350px); }
        .data-face     { transform: rotateY(180deg) translateZ(350px); }
        .settings-face { transform: rotateY(-90deg) translateZ(350px); }

        /* Cube Rotation Classes */
        .show-login    { transform: rotateY(0deg); }
        .show-reg      { transform: rotateY(-90deg); }
        .show-data     { transform: rotateY(-180deg); }
        .show-settings { transform: rotateY(90deg); }

        /* UI Elements */
        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        .btn-box { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1; padding: 12px; cursor: pointer; border-radius: 5px; border: none;
            font-weight: bold; transition: 0.3s; color: white; background: var(--primary);
        }
        button:hover { background: var(--accent); }
        .btn-danger { background: #dc3545; }
        .btn-secondary { background: #6c757d; }

        /* Data Table */
        .table-wrap { height: 350px; overflow-y: auto; margin-top: 10px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }

        footer { margin-top: auto; padding: 20px; text-align: center; color: #444; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .card { border: none; box-shadow: none; position: static; transform: none; width: 100%; }
            .table-wrap { height: auto; }
        }
    </style>
</head>
<body>

<header>
    <h1>The Knowledge Academy Of Science Jallah Jeem</h1>
</header>

<div class="scene" id="cube">
    <div class="card login-face">
        <h2 style="text-align: center;">Principal Login</h2>
        <div class="form-group"><label>User Name</label><input type="text" id="logUser" value="Hasnain"></div>
        <div class="form-group"><label>Password</label><input type="password" id="logPass" value="Hasnain"></div>
        <button onclick="checkLogin()" style="width: 100%;">Enter Academy Portal</button>
    </div>

    <div class="card reg-face">
        <h2 id="regTitle">Student Registration</h2>
        <input type="hidden" id="editIndex" value="-1">
        <div class="grid">
            <div class="form-group"><label>Name</label><input type="text" id="sName"></div>
            <div class="form-group"><label>Father Name</label><input type="text" id="fName"></div>
            <div class="form-group"><label>Mobile No</label><input type="text" id="mobile"></div>
            <div class="form-group"><label>Class</label><input type="text" id="class"></div>
            <div class="form-group"><label>Address</label><input type="text" id="addr"></div>
            <div class="form-group"><label>Joining Date</label><input type="date" id="jDate"></div>
            <div class="form-group"><label>Fee</label><input type="number" id="fee" oninput="calc()"></div>
            <div class="form-group"><label>Obtained Fees</label><input type="number" id="obtFee" oninput="calc()"></div>
        </div>
        <div class="form-group">
            <label>Remaining Fees</label>
            <input type="number" id="remFee" readonly style="background: #e9ecef; font-weight: bold; color: red;">
        </div>
        <div class="btn-box">
            <button onclick="saveStudent()" id="saveBtn">Save Student</button>
            <button class="btn-secondary" onclick="rotateTo('data')">View Database</button>
            <button class="btn-danger" onclick="rotateTo('settings')">Settings</button>
        </div>
    </div>

    <div class="card data-face">
        <h2>Student Records</h2>
        <div class="table-wrap" id="printSection">
            <table id="stuTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Class</th>
                        <th>Mobile</th>
                        <th>Total</th>
                        <th>Paid</th>
                        <th>Balance</th>
                        <th class="no-print">Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="btn-box no-print">
            <button onclick="window.print()">Print All Records</button>
            <button class="btn-secondary" onclick="rotateTo('reg')">Back to Form</button>
        </div>
    </div>

    <div class="card settings-face">
        <h2>System Settings</h2>
        <div class="form-group"><label>New Username</label><input type="text" id="newU"></div>
        <div class="form-group"><label>New Password</label><input type="password" id="newP"></div>
        <button onclick="updateCreds()">Update Credentials</button>
        <button class="btn-secondary" style="margin-top:10px; width:100%" onclick="rotateTo('reg')">Back</button>
    </div>
</div>

<footer>
    <strong>Made by Hasnain Haider</strong><br>
    Phone No. 03014464374
</footer>

<script>
    let students = [];
    let adminUser = "Hasnain";
    let adminPass = "Hasnain";

    const cube = document.getElementById('cube');

    function rotateTo(face) {
        cube.className = 'scene show-' + face;
    }

    function checkLogin() {
        const u = document.getElementById('logUser').value;
        const p = document.getElementById('logPass').value;
        if(u === adminUser && p === adminPass) rotateTo('reg');
        else alert("Incorrect Username or Password!");
    }

    function calc() {
        const f = parseFloat(document.getElementById('fee').value) || 0;
        const o = parseFloat(document.getElementById('obtFee').value) || 0;
        document.getElementById('remFee').value = f - o;
    }

    function saveStudent() {
        const index = document.getElementById('editIndex').value;
        const data = {
            name: document.getElementById('sName').value,
            father: document.getElementById('fName').value,
            mobile: document.getElementById('mobile').value,
            class: document.getElementById('class').value,
            addr: document.getElementById('addr').value,
            jDate: document.getElementById('jDate').value,
            fee: document.getElementById('fee').value,
            obt: document.getElementById('obtFee').value,
            rem: document.getElementById('remFee').value
        };

        if(!data.name) return alert("Student Name is required!");

        if(index === "-1") students.push(data);
        else {
            students[index] = data;
            document.getElementById('editIndex').value = "-1";
            document.getElementById('regTitle').innerText = "Student Registration";
            document.getElementById('saveBtn').innerText = "Save Student";
        }
        
        renderTable();
        clearForm();
        alert("Record Processed Successfully!");
    }

    function renderTable() {
        const tbody = document.querySelector('#stuTable tbody');
        tbody.innerHTML = "";
        students.forEach((s, i) => {
            tbody.innerHTML += `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.class}</td>
                    <td>${s.mobile}</td>
                    <td>${s.fee}</td>
                    <td>${s.obt}</td>
                    <td>${s.rem}</td>
                    <td class="no-print">
                        <button style="padding:2px; font-size:10px" onclick="editStudent(${i})">Edit</button>
                        <button class="btn-danger" style="padding:2px; font-size:10px" onclick="deleteStudent(${i})">Del</button>
                        <button class="btn-secondary" style="padding:2px; font-size:10px" onclick="printSlip(${i})">Slip</button>
                    </td>
                </tr>
            `;
        });
    }

    function editStudent(i) {
        const s = students[i];
        document.getElementById('sName').value = s.name;
        document.getElementById('fName').value = s.father;
        document.getElementById('mobile').value = s.mobile;
        document.getElementById('class').value = s.class;
        document.getElementById('addr').value = s.addr;
        document.getElementById('jDate').value = s.jDate;
        document.getElementById('fee').value = s.fee;
        document.getElementById('obtFee').value = s.obt;
        document.getElementById('remFee').value = s.rem;
        
        document.getElementById('editIndex').value = i;
        document.getElementById('regTitle').innerText = "Edit Student Info";
        document.getElementById('saveBtn').innerText = "Update Record";
        rotateTo('reg');
    }

    function deleteStudent(i) {
        if(confirm("Are you sure you want to remove this student?")) {
            students.splice(i, 1);
            renderTable();
        }
    }

    function printSlip(i) {
        const s = students[i];
        const win = window.open('', '', 'width=600,height=400');
        win.document.write(`
            <div style="font-family:sans-serif; padding:20px; border:2px solid #004085;">
                <h2 style="text-align:center">The Knowledge Academy Of Science</h2>
                <hr>
                <p><b>Student:</b> ${s.name} s/o ${s.father}</p>
                <p><b>Class:</b> ${s.class} | <b>Date:</b> ${s.jDate}</p>
                <p><b>Total Fee:</b> ${s.fee}</p>
                <p><b>Obtained:</b> ${s.obt}</p>
                <p style="color:red"><b>Balance:</b> ${s.rem}</p>
                <p style="text-align:right; margin-top:30px">Principal Signature: __________</p>
            </div>
        `);
        win.print();
        win.close();
    }

    function updateCreds() {
        const u = document.getElementById('newU').value;
        const p = document.getElementById('newP').value;
        if(u && p) {
            adminUser = u; adminPass = p;
            alert("Security Updated! Please login again.");
            rotateTo('login');
        }
    }

    function clearForm() {
        document.querySelectorAll('.reg-face input').forEach(inp => inp.value = "");
        document.getElementById('editIndex').value = "-1";
    }
</script>

</body>
</html>
